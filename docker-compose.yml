version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: code-fable-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/code_fable}
      - REDIS_URL=${REDIS_URL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
    volumes:
      - ./backend:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: code-fable-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
